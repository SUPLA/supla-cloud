imports:
  - {resource: build/version.php}

parameters:
  container.autowiring.strict_mode: true

  env(GOOGLE_RECAPTCHA_SECRET): ''
  env(GOOGLE_RECAPTCHA_SITE_KEY): ''
  env(CORS_ALLOW_ORIGIN): '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'


services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false
    bind:
      $suplaUrl: '%supla.url%'
      $recaptchaSecret: '%env(GOOGLE_RECAPTCHA_SECRET)%'
      $recaptchaSiteKey: '%env(GOOGLE_RECAPTCHA_SITE_KEY)%'
      $appEnv: '%kernel.environment%'
      Doctrine\ORM\EntityManagerInterface $measurementLogsEntityManager: '@supla.logs_entity_manager'

  _instanceof:
    App\ParamConverter\AbstractBodyParamConverter:
      tags: [request.param_converter]
    App\Model\ChannelActionExecutor\SingleChannelActionExecutor:
      tags: [supla.channel_action_executor]
    App\Model\UserConfigTranslator\UserConfigTranslator:
      tags: [supla.user_config_translator]
    App\Model\ChannelStateGetter\SingleChannelStateGetter:
      tags: [supla.channel_state_getter]
    App\Model\VirtualChannel\VirtualChannelConfigurator:
      tags: [supla.virtual_channel_configurator]
    Symfony\Component\Console\Command\Command:
      tags:
        - {name: monolog.logger, channel: supla_cli}
    App\Command\Cyclic\CyclicCommand:
      tags: [supla.cyclic_command]
    App\Command\Initialization\InitializationCommand:
      tags: [supla.initialization_command]
    App\Model\Schedule\SchedulePlanners\SchedulePlanner:
      tags: [supla.schedule_planner]

  App\:
    resource: '../src/'
    exclude:
      - '../src/DependencyInjection/'
      - '../src/frontend/'
      - '../src/Entity/'
      - '../src/'
      - '../src/Kernel.php'


  Doctrine\ORM\EntityManager: '@doctrine.orm.default_entity_manager'
  Doctrine\ORM\EntityManagerInterface: '@doctrine.orm.default_entity_manager'
  Symfony\Component\Serializer\Mapping\Factory\ClassMetadataFactoryInterface: '@serializer.mapping.class_metadata_factory'
  Symfony\Component\Serializer\NameConverter\NameConverterInterface: '@serializer.name_converter.metadata_aware'

  App\Command\:
    resource: '../src/Command'
  App\Command\Cyclic\DispatchCyclicTasksCommand:
    - !tagged supla.cyclic_command
  App\Command\Cyclic\DeleteNotConfirmedUsersCommand:
    $deleteOlderThanHours: '%supla.maintenance.delete_non_confirmed_users_older_than_hours%'
  App\Command\Cyclic\DeleteOldMeasurementLogsCommand:
    $logsRetentionConfig: '%supla.measurement_logs_retention%'
  App\Command\Cyclic\ClearObsoleteAuditEntriesCommand:
    $deleteOlderThanDays: '%supla.maintenance.delete_audit_entries_older_than_days%'
    $deleteOlderThanDaysCustom: '%supla.maintenance.delete_audit_entries_older_than_days_custom%'
  App\Command\Initialization\InitializeCommand:
    - !tagged supla.initialization_command
  App\Command\User\ApiInfoCommand:
    $enabled: '%supla.api_rate_limit.enabled%'
    $blocking: '%supla.api_rate_limit.blocking%'

  App\Controller\:
    resource: '../src/Controller'
    public: true

  App\Controller\DefaultController:
    $openApiCache: '@openapi_docs_cache'

  App\Controller\Api\ServerController:
    $suplaServerHost: '%supla.host%'
    $suplaVersion: '%supla.version%'
    $suplaVersionFull: '%supla.version_full%'
    $actAsBrokerCloud: '%supla.act_as_broker_cloud%'

  App\Controller\Api\StateWebhookController:
    $stateWebhooksForPublicAppsOnly: '%supla.state_webhooks.only_for_public_apps%'

  App\Controller\Api\UserController:
    $clientsRegistrationEnableTime: '%supla.clients_registration.registration_active_time.manual%'
    $ioDevicesRegistrationEnableTime: '%supla.io_devices_registration.registration_active_time.manual%'
    $requireRegulationsAcceptance: '%supla.require_regulations_acceptance%'
    $availableLanguages: '%supla.available_languages%'
    $accountsRegistrationEnabled: '%supla.accounts_registration_enabled%'
    $mqttBrokerEnabled: '%supla.mqtt_broker.enabled%'
    $mqttAuthEnabled: '%supla.mqtt_broker.integrated_auth%'

  App\Controller\ExecuteDirectLinkController:
    $logger: '@monolog.logger.supla_direct_links'

  App\Controller\OAuth\BrokerAuthorizeController:
    public: true
    arguments:
      $authorizeForm: '@fos_oauth_server.authorize.form'
      $authorizeFormHandler: '@fos_oauth_server.authorize.form.handler.default'

  App\Entity\Main\Listeners\:
    resource: '../src/Entity/Main/Listeners'
    tags:
      - {name: doctrine.orm.entity_listener}

  App\Message\:
    resource: '../src/Message'

  App\Message\EmailFromTemplateHandler:
    $defaultLocale: "%kernel.default_locale%"
  App\Message\EmailToAdminHandler:
    $adminEmail: "%env(SUPLA_ADMIN_EMAIL)%"

  App\Model\:
    resource: '../src/Model'

  App\Model\MeasurementLogsEntityManagerProvider:
    $databaseForLogs: '%supla.database_for_logs%'

  supla.logs_entity_manager:
    class: Doctrine\ORM\EntityManagerInterface
    factory: ['@App\Model\MeasurementLogsEntityManagerProvider', 'get']

  App\Model\LocalSuplaCloud:
    $address: '%supla.url%'

  App\Model\UserManager:
    $defaultClientsRegistrationTime: '%supla.clients_registration.registration_active_time.initial%'
    $defaultIoDevicesRegistrationTime: '%supla.io_devices_registration.registration_active_time.initial%'


  App\Model\Schedule\SchedulePlanners\CronExpressionSchedulePlanner:
    tags: [{name: supla.schedule_planner, priority: -10}]
  App\Model\Schedule\SchedulePlanners\CompositeSchedulePlanner:
    $planners: !tagged supla.schedule_planner

  App\Model\ChannelActionExecutor\ChannelActionExecutor:
    - !tagged supla.channel_action_executor

  App\Model\UserConfigTranslator\SubjectConfigTranslator:
    - !tagged supla.user_config_translator

  App\Model\ChannelStateGetter\ChannelStateGetter:
    arguments:
      - !tagged supla.channel_state_getter
    tags:
      - {name: monolog.logger, channel: supla_server}

  App\Model\VirtualChannel\VirtualChannelFactory:
    $configurators: !tagged supla.virtual_channel_configurator

  App\Model\Audit\FailedAuthAttemptsUserBlocker:
    $enabled: '%supla.brute_force_auth_prevention.enabled%'
    $maxFailedAttempts: '%supla.brute_force_auth_prevention.max_failed_attempts%'
    $blockTimeInSeconds: '%supla.brute_force_auth_prevention.block_time_seconds%'


  App\Supla\:
    resource: '../src/Supla'

  App\Supla\SuplaServerMock:
    tags:
      - {name: monolog.logger, channel: supla_server}
  App\Supla\SuplaServerReal:
    arguments:
      $socketPath: '%supla.server_socket%'
    tags:
      - {name: monolog.logger, channel: supla_server}

  App\Supla\SuplaAutodiscoverMock:
    tags:
      - {name: monolog.logger, channel: supla_autodiscover}

  App\Supla\SuplaAutodiscoverReal:
    arguments:
      $autodiscoverUrl: "%supla.autodiscover_url%"
      $actAsBrokerCloud: '%supla.act_as_broker_cloud%'
    tags:
      - {name: monolog.logger, channel: supla_autodiscover}

  App\Supla\SuplaServer: '@App\Supla\SuplaServerMock'
  App\Supla\SuplaAutodiscover: '@App\Supla\SuplaAutodiscoverMock'

  App\Supla\SuplaBrokerHttpClient:
    tags:
      - {name: monolog.logger, channel: supla_http_client}

  App\Supla\SuplaOcrClient:
    $ocrUrl: '%supla.ocr.url%'

  App\Auth\Voter\:
    resource: '../src/Auth/Voter'

  App\Auth\UserProvider: ~
  App\Auth\SuplaAccessTokenManager: ~

  # Make sure typehinted AccessTokenManagerInterface (e.g. in
  # DeleteObsoleteOauthTokensCommand) resolves to our custom manager,
  # not FOS' default — otherwise the deleteExpired() override is bypassed
  # and personal/non-expiring tokens get wiped hourly.
  FOS\OAuthServerBundle\Model\AccessTokenManagerInterface: '@App\Auth\SuplaAccessTokenManager'
  App\Auth\UserLoginAttemptListener:
    tags:
      - {name: kernel.event_listener, event: security.authentication.failure, method: onInteractiveAuthenticationFailure}
      - {name: kernel.event_listener, event: security.interactive_login, method: onInteractiveAuthenticationSuccess}
      - {name: monolog.logger, channel: supla_debug}

  App\Auth\SuplaOAuthStorage:
    $userProvider: '@App\Auth\UserProvider'

  App\Auth\OAuthEventListener: ~

  App\EventListener\ApiExceptionHandler:
    arguments:
      - "%kernel.debug%"
    tags:
      - {name: kernel.event_subscriber}

  App\EventListener\ApiRateLimit\ApiRateLimitListener:
    arguments:
      $enabled: '%supla.api_rate_limit.enabled%'
      $blocking: '%supla.api_rate_limit.blocking%'
      $logger: '@monolog.logger.supla_api_rate_limit'
    tags:
      - {name: kernel.event_listener, event: kernel.request, method: onKernelRequest}
      - {name: kernel.event_listener, event: kernel.response, method: onKernelResponse}
  App\EventListener\ApiRateLimit\ApiRateLimitStorage:
    $cache: '@api_rate_limit'
  App\EventListener\ApiRateLimit\ApiRateLimitRules:
    $globalRule: '%supla.api_rate_limit.global_limit%'
    $defaultUserRule: '%supla.api_rate_limit.user_default_limit%'

  App\EventListener\UnavailableInMaintenanceRequestListener:
    arguments:
      $maintenanceMode: "%supla.maintenance_mode%"
    tags:
      - {name: kernel.event_listener, event: kernel.controller, method: onKernelController}

  App\EventListener\ResponseContentLengthListener:
    tags: ['kernel.event_listener']

  App\EventListener\FlushSuplaServerCommandsOnResponseListener:
    tags: ['kernel.event_listener']

  App\EventListener\DbConnectionTimezoneUtcSetter:
    tags:
      - {name: doctrine.event_listener, event: postConnect}

  Doctrine\Migrations\Version\DbalMigrationFactory: ~
  App\Migrations\Factory\MigrationFactoryDecorator:
    decorates: Doctrine\Migrations\Version\DbalMigrationFactory
    arguments: ['@App\Migrations\Factory\MigrationFactoryDecorator.inner', '@service_container']
    tags:
      - {name: monolog.logger, channel: supla_migrations}

  App\ParamConverter\:
    resource: '../src/ParamConverter'

  App\Serialization\:
    resource: '../src/Serialization'
  App\Serialization\UserSerializer:
    $apiRateLimitEnabled: '%supla.api_rate_limit.enabled%'

  App\Mailer\SuplaMailer:
    arguments:
      $mailerFrom: "%supla.mailer_from%"
    tags:
      - {name: monolog.logger, channel: supla_mails}

  App\Twig\FrontendConfig: ~

  App\Auth\SuplaOAuth2Authenticator: ~
  App\Auth\SuplaOAuth2:
    arguments:
      - '@fos_oauth_server.storage'
      - '%fos_oauth_server.server.options%'
      - '%supla.oauth.tokens_lifetime%'

  fos_oauth_server.server: '@App\Auth\SuplaOAuth2'
  OAuth2\OAuth2: '@App\Auth\SuplaOAuth2'

  ## REPOSITORIES ##

  App\Repository\:
    resource: '../src/Repository'

  App\Repository\AccessIdRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\AccessID]

  App\Repository\AccessTokenRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\OAuth\AccessToken]

  App\Repository\ApiClientRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\OAuth\ApiClient]

  App\Repository\ApiClientAuthorizationRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\OAuth\ApiClientAuthorization]

  App\Repository\AuditEntryRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\AuditEntry]

  App\Repository\ChannelGroupRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\IODeviceChannelGroup]

  App\Repository\SceneRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\Scene]

  App\Repository\UserIconRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\UserIcon]

  App\Repository\ClientAppRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\ClientApp]

  App\Repository\LocationRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\Location]

  App\Repository\ScheduleRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\Schedule]

  App\Repository\StateWebhookRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\StateWebhook]

  App\Repository\UserRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\User]

  App\Repository\IODeviceRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\IODevice]

  App\Repository\IODeviceChannelRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\IODeviceChannel]

  App\Repository\AmazonAlexaRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\AmazonAlexa]

  App\Repository\GoogleHomeRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\GoogleHome]

  App\Repository\DirectLinkRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\DirectLink]

  App\Repository\SettingsStringRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\SettingsString]

  App\Repository\PushNotificationRepository:
    factory: ["@doctrine.orm.entity_manager", getRepository]
    arguments: [App\Entity\Main\PushNotification]

when@dev:
  services:
    App\Supla\SuplaServerMockCommandsCollector:
      public: false
      tags: [{name: data_collector, template: '@Supla/Supla/supla-server-mock-data-collector.html.twig', id: 'supla.supla_server_mock_data_collector'}]

when@prod:
  services:
    App\Supla\SuplaServer: '@App\Supla\SuplaServerReal'
    App\Supla\SuplaAutodiscover: '@App\Supla\SuplaAutodiscoverReal'
