oauthAuthorize:
  resource: "../src/Controller/OAuth"
  type: annotation

supla_default:
  resource: "../src/Controller/DefaultController.php"
  type: annotation

directLinksExecutore:
  resource: "../src/Controller/ExecuteDirectLinkController.php"
  type: annotation

supla_api:
  type: annotation
  prefix: /api/{version}
  resource: "../src/Controller/Api"
  name_prefix: api_
  defaults: {_format: json}

supla_api_default:
  type: annotation
  prefix: /api
  resource: "../src/Controller/Api"
  name_prefix: api_default_
  defaults: {_format: json}
